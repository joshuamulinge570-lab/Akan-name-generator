<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akan Name Generator</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- Navigation -->
  <nav class="menuNav">
    <ul>
      <li><a href="#head">Home</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#form-section">Akan Names</a></li>
    </ul>
  </nav>

  <!-- Header -->
  <header id="head">
    <h1>Akan Name Generator</h1>
    <figure>
      <img src="./download99.jpg" alt="Logo of website" />
    </figure>
    <p id="about">
      Welcome to the Akan Name Generator! This tool generates your Akan name
      based on your birth date and gender.
    </p>
  </header>

  <!-- Form Section -->
  <section id="form-section">
    <div class="formName">
      <div class="formBackground">
        <h2>When were you born?</h2>

        <form id="form-submit">
          <label for="date">Select your birth date:</label>
          <input
            id="date"
            type="number"
            min="1"
            max="31"
            placeholder="Date: 1-31"
            required
          />
          <br /><br />

          <label for="month">Select your birth month:</label>
          <input
            type="number"
            id="month"
            min="1"
            max="12"
            placeholder="Month: 1-12"
            required
          />
          <br /><br />

          <label for="year">Select your birth year:</label>
          <input
            type="number"
            id="year"
            min="1900"
            max="2026"
            placeholder="Year: 1900-2026"
            required
          />
          <br /><br />

          <label for="gender">Select your gender:</label>
          <select id="gender" required>
            <option value="">--Choose Gender--</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
          <br /><br />

          <button type="submit" id="submit-button">
            Generate Akan Name
          </button>
        </form>

        <!-- Result -->
        <p id="result"></p>

      </div>
    </div>
  </section>

  <!-- Hero Section -->
  <section id="hero">
    <div class="hero">
      <h2>Akan Name Generator</h2>
      <figure>
        <img src="./download66.jpg" alt="Hero image of website" />
      </figure>
      <p>Discover your traditional Akan name!</p>
    </div>
  </section>

  <script src="./script.js" defer></script>

</body>
</html>
