<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akan Name Generator</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <script defer src="./script/index.js"></script>
</head>
<body>
     <!-- Header -->
    <header>
    <section>
        <div id="head" ></div>
            <h1>Akan Name Generator</h1>
            <figure>
                <img src="./download99.jpg" alt="Logo of website">
            </figure>
            <p>Welcome to the Akan Name Generator! This is a simple tool to generate your Akan name based on your birth date and gender.</p>
        </div>
    </section>
    <!-- Form Section -->
    <section id="form">
        <div class="formName">
            <div class="formBackground">
                <h2>When were you born?</h2>
                <div class="formDiv">
                    <form onsubmit="getAkanName(event)">
                        <label for="birthdate">Select your birth date:</label>
                        <input id="date" type="number" min="1" max="31" placeholder="Date:1-31" required><br><br>

                        <label for="birthmonth">Select your birth month:</label>
                        <input type="number" name="month" id="month" min="1" max="12" placeholder="Month:1-12" required><br><br>

                        <label for="year">Select your birth year:</label>
                        <input type="number" id="year"  min="1900" max="2024" placeholder="Year:1900-2024" required><br><br>

                        <label for="gender">Select your gender:</label>
                        <select name="gender" id="gender" required>
                            <option value="0">Male</option>
                            <option value="1">Female</option>
                        </select>
                        <br><br>

                        <input id="ClearButton" class="button" type="reset" value="Clear">
                        <input id="SubmitButton" class="button" type="submit" value="Submit">

                                                               
                        <button type="submit">Generate Akan Name</button>
                    </form>
                    </div>
                    </div>
                    </div>
                    </section>
                

            </div>
            <nav class="menuNav">
                
                    
                        <li><a href="#head">Home</a></li>
                        <li><a href="#About">About</a></li>
                        <li><a href="#form">Akan Names</a></li>
                        <li> <a href="#Find Me"></a></li>
                        </ul>

                      </nav>
               
         </header>
        </body>
        <!-- Hero Section -->
    </section id="hero">
    
    <div class="hero">
        <h1>Akan name generator</h1>
        <figure>
            <img src="./download66.jpg" alt="Hero image of website">
        </figure>
        <p>Welcome to Akan Name Generator!</p>
    </div>

</section>
  
        </body>
      </html>
